name: Update organization profile

on:
  workflow_dispatch:
  schedule:
    - cron: "18 20 * * *"

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate profile
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN || github.token }}
          MEMBER_COUNT: "24"
          VISIBLE_PROJECT_COUNT: "43"
        run: python3 scripts/update_profile.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update organization profile"
